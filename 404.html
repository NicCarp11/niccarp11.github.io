<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nicolò Carpentieri | Page not found</title>
  <link rel="icon" type="image/svg+xml" href="/spock.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .not-found {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .not-found .code {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .not-found h1 { font-size: 1.6rem; margin: 0 0 10px; }
    .not-found p { color: var(--text-muted); margin-bottom: 22px; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/">nicolo@carpentieri</a>
    </div>
  </nav>
  <div class="not-found">
    <p class="code">error 404</p>
    <h1>This isn't the page you're looking for.</h1>
    <p>The page may have moved, or never existed.</p>
    <a href="/" class="hero-socials" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.85rem;border:1px solid var(--border);border-radius:999px;padding:6px 16px;color:var(--text-muted);">Back to homepage</a>
  </div>
</body>
</html>
